# packages.conf - Package definitions for Ubuntu System Setup Script

# =============================================================================
# BASE PACKAGES - Always installed
# =============================================================================
BASE_PACKAGES=(
    whiptail
    btop
    unattended-upgrades
    software-properties-common
    wget
    curl
    jq
    ufw
    openssh-server
    ipcalc
    mc
    git
    nano
)

# =============================================================================
# EXTRA PACKAGES - Optional development and utility tools
# =============================================================================
EXTRA_PACKAGES=(
    dconf-cli
    htop
    gh
    locate
    fzf
    ansiweather
    wireguard
    cowsay
    wireguard-tools
    bc
    tmux
    snapd
    iotop
    iftop
    coreutils
    rclone
    rsync
    figlet
    p7zip-full
    wipe
    lolcat
    python3-full
    python3-pip
    speedtest-cli
)

# =============================================================================
# DOCKER PACKAGES - Container runtime and tools
# =============================================================================
DOCKER_PACKAGES=(
    docker.io
    docker-compose
)

# =============================================================================
# NODE/NVM CONFIGURATION - Node.js version manager
# =============================================================================
NVM_VERSION="v0.39.7"
NVM_INSTALL_URL="https://raw.githubusercontent.com/nvm-sh/nvm/${NVM_VERSION}/install.sh"
NODE_VERSION="--lts"  # Use 'node' for latest, '--lts' for LTS, or specific version like '20.0.0'